<!DOCTYPE html>

<title>DajUleti — Treba ti pomoć? Netko će uletit.</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #1A1814;
    --muted: #6E6A60;
    --line: #E8E3D5;
    --paper-warm: #F8F4EC;
    --accent: #FFD400;
    --accent-soft: #FFF3B5;
    --accent-fg: #8A6A00;
    --accent-ink: #0E0E10;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper-warm); }
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  input, button, select, textarea { font-family: inherit; }
  ::selection { background: var(--accent); color: var(--accent-ink); }
  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #D8D2C2; border-radius: 999px; }
  ::-webkit-scrollbar-track { background: transparent; }

  @keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(12px) } to { opacity: 1; transform: translateY(0) } }
</style>
</head>
